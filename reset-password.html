<!DOCTYPE html>
<html lang="ro" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setează o nouă parolă — Curricula</title>
    <meta name="description" content="Setează o nouă parolă pentru contul tău Curricula.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="canonical" href="https://curricula.ro/reset-password.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="js/api-config.js"></script>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-body);
            background: var(--color-bg);
            color: var(--color-text);
            padding: 24px;
            margin: 0;
        }

        .auth-card {
            max-width: 480px;
            width: 100%;
            background: var(--color-bg-card);
            border-radius: 32px;
            box-shadow: 0 22px 60px var(--color-shadow-lg);
            border: 1px solid var(--color-border);
            padding: 40px;
            backdrop-filter: blur(18px);
        }

        h2 {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            margin-bottom: 12px;
        }

        p {
            font-size: 0.95rem;
            color: var(--color-text-secondary);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        </style>
</head>

<body>
    <div class="auth-card">
        <a href="index.html" class="logo">
            <svg viewBox="0 0 36 36" fill="none">
                <rect width="36" height="36" rx="10" fill="currentColor" />
                <path d="M10 12h16M10 18h12M10 24h8" stroke="white" stroke-width="2.5" stroke-linecap="round" />
                <circle cx="27" cy="24" r="4" fill="#FCD34D" />
                <path d="M25.5 24l1 1 2-2" stroke="white" stroke-width="1.2" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            Curricula
        </a>

        <h2>Resetează parola</h2>
        <p>Introdu noua ta parolă mai jos pentru a-ți recupera accesul la cont.</p>

        <div id="messageBox" class="message-box"></div>

        <form id="resetForm">
            <div class="form-group">
                <label class="form-label" for="password">Noua parolă</label>
                <input type="password" id="password" class="input-field" placeholder="••••••••" minlength="6" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirmPassword">Confirmă noua parolă</label>
                <input type="password" id="confirmPassword" class="input-field" placeholder="••••••••" minlength="6"
                    required>
            </div>

            <button type="submit" class="btn-primary" id="submitBtn">Actualizează parola</button>
        </form>
    </div>

    <script>
        // Tema
        (function () {
            const saved = localStorage.getItem('curricula-theme');
            if (saved) document.documentElement.setAttribute('data-theme', saved);
        })();

        const form = document.getElementById('resetForm');
        const passInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const submitBtn = document.getElementById('submitBtn');
        const messageBox = document.getElementById('messageBox');

        // Ia token-ul din URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            messageBox.textContent = 'Token lipsă. Link-ul de resetare este invalid.';
            messageBox.className = 'message-box error';
            messageBox.style.display = 'block';
            form.style.display = 'none';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const nouaParola = passInput.value;
            const confirm = confirmInput.value;

            if (nouaParola !== confirm) {
                messageBox.textContent = 'Parolele nu coincid.';
                messageBox.className = 'message-box error';
                messageBox.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Se actualizează...';
            messageBox.style.display = 'none';

            // Gestionează URL-ul de bază pentru API (Local vs Supabase)
            const getApiUrl = (path) => API_CONFIG.baseUrl + path;
            

            try {
                const response = await fetch(getApiUrl('/auth/reset-password'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, nouaParola })
                });

                const data = await response.json();

                if (response.ok) {
                    messageBox.textContent = data.message;
                    messageBox.className = 'message-box success';
                    messageBox.style.display = 'block';
                    form.style.display = 'none';

                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    messageBox.textContent = data.error || 'A apărut o eroare.';
                    messageBox.className = 'message-box error';
                    messageBox.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Actualizează parola';
                }
            } catch (err) {
                messageBox.textContent = 'Nu s-a putut conecta la server.';
                messageBox.className = 'message-box error';
                messageBox.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Actualizează parola';
            }
        });
    </script>
</body>

</html>
