<!DOCTYPE html>
<html lang="ro" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setează o nouă parolă — Curricula</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --color-primary: #0D9488;
            --color-primary-light: #14B8A6;
            --color-primary-dark: #0F766E;
            --color-bg: #F6F9F8;
            --color-bg-card: rgba(255, 255, 255, 0.9);
            --color-text: #1A2E35;
            --color-text-secondary: #4A6670;
            --color-text-muted: #7A9AA5;
            --color-border: rgba(13, 148, 136, 0.16);
            --color-shadow-lg: rgba(15, 118, 110, 0.18);
            --color-success: #059669;
            --color-error: #DC2626;
            --font-heading: 'Space Grotesk', sans-serif;
            --font-body: 'DM Sans', sans-serif;
            --radius-lg: 24px;
            --transition: 0.25s ease;
        }

        [data-theme="dark"] {
            --color-bg: #0F1A1C;
            --color-bg-card: rgba(15, 30, 36, 0.96);
            --color-text: #E8F4F0;
            --color-text-secondary: #A0BFC8;
            --color-text-muted: #6A8E98;
            --color-border: rgba(45, 212, 191, 0.35);
            --color-shadow-lg: rgba(0, 0, 0, 0.55);
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-body);
            background: var(--color-bg);
            color: var(--color-text);
            padding: 24px;
            margin: 0;
        }

        .auth-card {
            max-width: 480px;
            width: 100%;
            background: var(--color-bg-card);
            border-radius: 32px;
            box-shadow: 0 22px 60px var(--color-shadow-lg);
            border: 1px solid var(--color-border);
            padding: 40px;
            backdrop-filter: blur(18px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
            font-family: var(--font-heading);
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--color-primary);
            text-decoration: none;
        }

        .logo svg {
            width: 32px;
            height: 32px;
        }

        h2 {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            margin-bottom: 12px;
        }

        p {
            font-size: 0.95rem;
            color: var(--color-text-secondary);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .input-field {
            width: 100%;
            border-radius: 12px;
            border: 1px solid var(--color-border);
            padding: 12px 16px;
            font-size: 1rem;
            outline: none;
            transition: all var(--transition);
            background: rgba(255, 255, 255, 0.8);
        }

        [data-theme="dark"] .input-field {
            background: rgba(15, 23, 42, 0.85);
            color: white;
        }

        .input-field:focus {
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.1);
        }

        .btn-primary {
            width: 100%;
            border-radius: 12px;
            padding: 12px;
            border: none;
            background: var(--color-primary);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: 0 4px 12px rgba(13, 148, 136, 0.2);
        }

        .btn-primary:hover {
            background: var(--color-primary-dark);
            transform: translateY(-1px);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .message-box {
            padding: 12px;
            border-radius: 12px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            display: none;
        }

        .message-box.error {
            background: rgba(220, 38, 38, 0.1);
            color: var(--color-error);
            border: 1px solid rgba(220, 38, 38, 0.2);
        }

        .message-box.success {
            background: rgba(5, 150, 105, 0.1);
            color: var(--color-success);
            border: 1px solid rgba(5, 150, 105, 0.2);
        }

        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="auth-card">
        <a href="index.html" class="logo">
            <svg viewBox="0 0 36 36" fill="none">
                <rect width="36" height="36" rx="10" fill="currentColor" />
                <path d="M10 12h16M10 18h12M10 24h8" stroke="white" stroke-width="2.5" stroke-linecap="round" />
                <circle cx="27" cy="24" r="4" fill="#FCD34D" />
                <path d="M25.5 24l1 1 2-2" stroke="white" stroke-width="1.2" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            Curricula
        </a>

        <h2>Resetează parola</h2>
        <p>Introdu noua ta parolă mai jos pentru a-ți recupera accesul la cont.</p>

        <div id="messageBox" class="message-box"></div>

        <form id="resetForm">
            <div class="form-group">
                <label class="form-label" for="password">Noua parolă</label>
                <input type="password" id="password" class="input-field" placeholder="••••••••" minlength="6" required>
            </div>

            <div class="form-group">
                <label class="form-label" for="confirmPassword">Confirmă noua parolă</label>
                <input type="password" id="confirmPassword" class="input-field" placeholder="••••••••" minlength="6"
                    required>
            </div>

            <button type="submit" class="btn-primary" id="submitBtn">Actualizează parola</button>
        </form>
    </div>

    <script>
        // Tema
        (function () {
            const saved = localStorage.getItem('curricula-theme');
            if (saved) document.documentElement.setAttribute('data-theme', saved);
        })();

        const form = document.getElementById('resetForm');
        const passInput = document.getElementById('password');
        const confirmInput = document.getElementById('confirmPassword');
        const submitBtn = document.getElementById('submitBtn');
        const messageBox = document.getElementById('messageBox');

        // Ia token-ul din URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            messageBox.textContent = 'Token lipsă. Link-ul de resetare este invalid.';
            messageBox.className = 'message-box error';
            messageBox.style.display = 'block';
            form.style.display = 'none';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const nouaParola = passInput.value;
            const confirm = confirmInput.value;

            if (nouaParola !== confirm) {
                messageBox.textContent = 'Parolele nu coincid.';
                messageBox.className = 'message-box error';
                messageBox.style.display = 'block';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Se actualizează...';
            messageBox.style.display = 'none';

            const getApiUrl = (path) => {
                const isLocalFile = window.location.protocol === 'file:';
                return (isLocalFile ? 'http://localhost:3000' : '') + path;
            };

            try {
                const response = await fetch(getApiUrl('/api/reset-password'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, nouaParola })
                });

                const data = await response.json();

                if (response.ok) {
                    messageBox.textContent = data.message;
                    messageBox.className = 'message-box success';
                    messageBox.style.display = 'block';
                    form.style.display = 'none';

                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    messageBox.textContent = data.error || 'A apărut o eroare.';
                    messageBox.className = 'message-box error';
                    messageBox.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Actualizează parola';
                }
            } catch (err) {
                messageBox.textContent = 'Nu s-a putut conecta la server.';
                messageBox.className = 'message-box error';
                messageBox.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Actualizează parola';
            }
        });
    </script>
</body>

</html>
