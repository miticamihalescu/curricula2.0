<!DOCTYPE html>
<html lang="ro" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperare Parolă — Curricula</title>
    <meta name="description" content="Recuperează accesul la contul tău Curricula prin resetarea parolei.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="canonical" href="https://curricula.ro/forgot-password.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="js/api-config.js"></script>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-body);
            background: var(--color-bg);
            color: var(--color-text);
            padding: 24px;
            margin: 0;
        }

        .auth-card {
            max-width: 480px;
            width: 100%;
            background: var(--color-bg-card);
            border-radius: 32px;
            box-shadow: 0 22px 60px var(--color-shadow-lg);
            border: 1px solid var(--color-border);
            padding: 40px;
            backdrop-filter: blur(18px);
        }

        h2 {
            font-family: var(--font-heading);
            font-size: 1.8rem;
            margin-bottom: 12px;
        }

        p {
            font-size: 0.95rem;
            color: var(--color-text-secondary);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        
        .back-link {
            display: block;
            text-align: center;
            margin-top: 24px;
            font-size: 0.9rem;
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }


</style>
</head>

<body>
    <div class="auth-card">
        <a href="index.html" class="logo">
            <svg viewBox="0 0 36 36" fill="none">
                <rect width="36" height="36" rx="10" fill="currentColor" />
                <path d="M10 12h16M10 18h12M10 24h8" stroke="white" stroke-width="2.5" stroke-linecap="round" />
                <circle cx="27" cy="24" r="4" fill="#FCD34D" />
                <path d="M25.5 24l1 1 2-2" stroke="white" stroke-width="1.2" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            Curricula
        </a>

        <h2>Ți-ai uitat parola?</h2>
        <p>Nicio problemă. Introdu adresa de e-mail mai jos și îți vom trimite instrucțiunile pentru resetare.</p>

        <div id="messageBox" class="message-box"></div>

        <form id="forgotForm">
            <div class="form-group">
                <label class="form-label" for="email">Adresa de e-mail</label>
                <input type="email" id="email" class="input-field" placeholder="profesor@exemplu.ro" required>
            </div>

            <button type="submit" class="btn-primary" id="submitBtn">Trimite link-ul de resetare</button>
        </form>

        <a href="login.html" class="back-link">← Înapoi la autentificare</a>
    </div>

    <script>
        // Tema
        (function () {
            const saved = localStorage.getItem('curricula-theme');
            if (saved) document.documentElement.setAttribute('data-theme', saved);
        })();

        const form = document.getElementById('forgotForm');
        const emailInput = document.getElementById('email');
        const submitBtn = document.getElementById('submitBtn');
        const messageBox = document.getElementById('messageBox');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Se trimite...';
            messageBox.style.display = 'none';
            debugBox.style.display = 'none';

            // Gestionează URL-ul de bază pentru API (Local vs Supabase)
            const getApiUrl = (path) => API_CONFIG.baseUrl + path;

            try {
                const response = await fetch(getApiUrl('/auth/forgot-password'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (response.ok) {
                    messageBox.textContent = data.message;
                    messageBox.className = 'message-box success';
                    messageBox.style.display = 'block';
                    form.style.display = 'none';
                } else {
                    messageBox.textContent = data.error || 'A apărut o eroare.';
                    messageBox.className = 'message-box error';
                    messageBox.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Trimite link-ul de resetare';
                }
            } catch (err) {
                messageBox.textContent = 'Nu s-a putut conecta la server.';
                messageBox.className = 'message-box error';
                messageBox.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Trimite link-ul de resetare';
            }
        });
    </script>
</body>

</html>
